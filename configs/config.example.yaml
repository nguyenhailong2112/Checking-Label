models:
  label_model_path: "weights/label_model.pt"
  code_model_path: "weights/code_model.pt"
  defect_model_path: "weights/defect_model.pt"
  deploy_dir: "weights/staged"

inference:
  image_size: 640
  conf_threshold: 0.25
  iou_threshold: 0.45
  max_det: 50
  device: "cpu"

inspection:
  mode: "full"                  # full | label_only | code_only | defect_only
  low_conf_threshold: 0.55
  require_code: true
  require_decode: true
  inspect_defect: true
  decode_on_code_crop: true

preprocess:
  enhance_contrast: true
  sharpen: true
  brightness_alpha: 1.1
  brightness_beta: 3
  deskew: false

output:
  save_dir: "outputs"
  save_visualization: true
  save_json: true

active_learning:
  save_dir: "data/collected"
  auto_collect_ng: false
  auto_collect_low_conf: false
  save_visualization: true
  save_crop: true

training:
  workspace_dir: "data/fine_tune"
  output_dir: "runs/fine_tune"

ui:
  page_title: "Edge AI Label & Barcode Inspection"
  page_icon: "🧠"